<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <!-- bolt body: bright top-left → Kick green → deep green -->
    <linearGradient id="ksBolt" x1="86" y1="30" x2="176" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9DFF6E"/>
      <stop offset=".42" stop-color="#53FC18"/>
      <stop offset="1" stop-color="#31CE00"/>
    </linearGradient>
    <!-- dark squircle badge -->
    <linearGradient id="ksBg" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1C1C1C"/>
      <stop offset="1" stop-color="#080808"/>
    </linearGradient>
    <!-- green halo behind the bolt -->
    <radialGradient id="ksGlow" cx=".5" cy=".44" r=".52">
      <stop offset="0" stop-color="#53FC18" stop-opacity=".38"/>
      <stop offset="1" stop-color="#53FC18" stop-opacity="0"/>
    </radialGradient>
    <!-- top sheen on the badge -->
    <linearGradient id="ksSheen" x1="0" y1="8" x2="0" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ksShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="11" flood-color="#53FC18" flood-opacity=".5"/>
    </filter>
  </defs>

  <!-- badge -->
  <rect x="8" y="8" width="240" height="240" rx="62" fill="url(#ksBg)"/>
  <rect x="8" y="8" width="240" height="240" rx="62" fill="url(#ksGlow)"/>
  <rect x="8" y="8" width="240" height="240" rx="62" fill="url(#ksSheen)"/>
  <rect x="9.75" y="9.75" width="236.5" height="236.5" rx="60.25" fill="none"
        stroke="#53FC18" stroke-opacity=".22" stroke-width="2.5"/>

  <!-- lightning bolt (rounded joins via matched fill+stroke) -->
  <g filter="url(#ksShadow)">
    <path d="M137.5 33 L42.5 147 L128 147 L118.5 223 L213.5 109 L128 109 Z"
          fill="url(#ksBolt)" stroke="url(#ksBolt)" stroke-width="17"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- rim highlight along the upper-left edge for a bevelled, glossy pop -->
  <path d="M136 37 L47 144" fill="none" stroke="#E4FFD2" stroke-opacity=".65"
        stroke-width="6.5" stroke-linecap="round"/>
</svg>
